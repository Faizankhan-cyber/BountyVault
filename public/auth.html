<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - BountyVault</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Welcome to BountyVault</h1>

      <!-- Role Selection -->
      <div class="role-cards">
        <div class="role-card" data-role="poster">
          <h3>Poster</h3>
          <p>Post bounties and find talent</p>
        </div>
        <div class="role-card" data-role="worker">
          <h3>Worker</h3>
          <p>Complete tasks and earn rewards</p>
        </div>
        <div class="role-card" data-role="admin">
          <h3>Admin</h3>
          <p>Manage platform and resolve disputes</p>
        </div>
      </div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="auth-button" id="login-button" disabled>
          Login
        </button>
      </form>

      <div id="error-message" class="error-message" style="display: none;"></div>
    </div>
  </div>

  <script>
    let selectedRole = null;

    // Role selection
    document.querySelectorAll('.role-card').forEach(card => {
      card.addEventListener('click', () => {
        // Remove selected class from all cards
        document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
        // Add selected class to clicked card
        card.classList.add('selected');
        selectedRole = card.dataset.role;

        // Enable login button if role is selected
        document.getElementById('login-button').disabled = false;
      });
    });

    // Check if already logged in
    function checkAuth() {
      const user = localStorage.getItem('bountyvault_user');
      if (user) {
        const userData = JSON.parse(user);
        redirectBasedOnRole(userData.role);
      }
    }

    // Redirect based on role
    function redirectBasedOnRole(role) {
      switch (role) {
        case 'poster':
          window.location.href = 'poster.html';
          break;
        case 'worker':
          window.location.href = 'worker.html';
          break;
        case 'admin':
          window.location.href = 'admin.html';
          break;
        default:
          console.error('Unknown role:', role);
      }
    }

    // Handle form submission
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!selectedRole) {
        showError('Please select a role');
        return;
      }

      const formData = new FormData(e.target);
      const loginData = {
        name: formData.get('name'),
        email: formData.get('email'),
        password: formData.get('password'),
        role: selectedRole
      };

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(loginData)
        });

        if (response.ok) {
          const userData = await response.json();

          // Save to localStorage
          localStorage.setItem('bountyvault_user', JSON.stringify(userData));

          // Redirect based on role
          redirectBasedOnRole(userData.role);
        } else {
          const error = await response.json();
          showError(error.message || 'Login failed');
        }
      } catch (error) {
        console.error('Login error:', error);
        showError('Network error. Please try again.');
      }
    });

    // Show error message
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';

      // Hide after 5 seconds
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 5000);
    }

    // Check auth on page load
    checkAuth();
  </script>
</body>
</html>
